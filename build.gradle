plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.fernirx'
version = '0.0.1-SNAPSHOT'
description = 'User_api'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot starters cơ bản (nếu chưa có)
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // MySQL Connector (dùng cho TiDB vì TiDB tương thích MySQL protocol)
    runtimeOnly 'com.mysql:mysql-connector-j'  // Phiên bản mới nhất, Spring Boot sẽ quản lý version

    // Lombok (tùy chọn, để giảm boilerplate code)
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Test (nếu cần)
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
